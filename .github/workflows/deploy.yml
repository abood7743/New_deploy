name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - stage
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ... (خطوات الـ Build والـ Login تبقى كما هي)

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # هنا نجعل الـ Tag يتغير حسب الفرع (dev, stage, main)
          tags: ${{ secrets.DOCKER_USERNAME }}/tech-samood:${{ github.ref_name }}

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            # سحب الحاوية الخاصة بالفرع الحالي
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/tech-samood:${{ github.ref_name }}
            
            # تحديد المنفذ بناءً على الفرع (مثلاً: dev=8081, stage=8082, main=80)
            if [ "${{ github.ref_name }}" == "main" ]; then PORT=80; CONTAINER="prod_cont";
            elif [ "${{ github.ref_name }}" == "stage" ]; then PORT=8082; CONTAINER="stage_cont";
            else PORT=8081; CONTAINER="dev_cont"; fi

            # إيقاف الحاوية القديمة وتشغيل الجديدة
            sudo docker stop $CONTAINER || true
            sudo docker rm $CONTAINER || true
            sudo docker run -d --name $CONTAINER -p $PORT:80 ${{ secrets.DOCKER_USERNAME }}/tech-samood:${{ github.ref_name }}