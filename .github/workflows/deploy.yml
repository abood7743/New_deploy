name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - stage
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الكود من المستودع (هذه الخطوة هي حل المشكلة في لقطة الشاشة 195)
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. تسجيل الدخول إلى Docker Hub باستخدام Secrets التي أنشأتها
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. بناء الحاوية ورفعها مع Tag يعتمد على اسم الفرع (dev أو stage أو main)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tech-samood:${{ github.ref_name }}

      # 4. الاتصال بسيرفر AWS وتنفيذ النشر بناءً على نوع البيئة
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            # سحب نسخة الحاوية الخاصة بالفرع الحالي
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/tech-samood:${{ github.ref_name }}
            
            # تحديد المنفذ واسم الحاوية بناءً على الفرع النشط
            if [ "${{ github.ref_name }}" == "main" ]; then
              PORT=80
              CONTAINER="prod_container"
            elif [ "${{ github.ref_name }}" == "stage" ]; then
              PORT=8082
              CONTAINER="stage_container"
            else
              PORT=8081
              CONTAINER="dev_container"
            fi

            # إيقاف الحاوية القديمة للبيئة المحددة وحذفها لتجنب التعارض
            sudo docker stop $CONTAINER || true
            sudo docker rm $CONTAINER || true
            
            # تشغيل الحاوية الجديدة وربطها بالمنفذ المخصص لها
            sudo docker run -d --name $CONTAINER -p $PORT:80 ${{ secrets.DOCKER_USERNAME }}/tech-samood:${{ github.ref_name }}
            