name: Enterprise Multi-Environment Deploy to EC2

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Determine Target Environment & Path
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_PATH=/var/www/production" >> $GITHUB_ENV
            echo "ENV_NAME=Production" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "ENV_PATH=/var/www/staging" >> $GITHUB_ENV
            echo "ENV_NAME=Staging" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "ENV_PATH=/var/www/dev" >> $GITHUB_ENV
            echo "ENV_NAME=Development" >> $GITHUB_ENV
          fi

      - name: SSH into EC2 and Deploy Updates
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            echo "🚀 Starting Deployment to Target Environment: ${{ env.ENV_NAME }}"
            echo "📂 Target Path: ${{ env.ENV_PATH }}"
            
            # الانتقال إلى المجلد المستهدف بناءً على فرع الجيت الذي حصل عليه الـ push
            cd ${{ env.ENV_PATH }}
            
            # تنظيف أي تغييرات محلية غير مقصودة على السيرفر لضمان نجاح السحب
            git reset --hard HEAD
            
            # سحب التحديثات من الفرع المقابل تماماً بشكل آمن
            git pull origin ${{ github.ref_name }}
            
            echo "✅ Deployment to ${{ env.ENV_NAME }} completed successfully!"